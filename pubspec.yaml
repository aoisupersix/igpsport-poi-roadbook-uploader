name: igpsport_poi_roadbook_uploader
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0
  riverpod_annotation: ^4.0.3
  hooks_riverpod: ^3.3.2
  flutter_hooks: ^0.21.3+1
  go_router: ^17.3.0
  intl: ^0.20.2
  logger: ^2.7.0
  collection: ^1.19.1
  flutter_launcher_icons: ^0.14.4
  slang: ^4.16.0
  slang_flutter: ^4.16.0
  package_info_plus: ^9.0.1
  flutter_secure_storage: ^9.2.4
  file_picker: ^8.1.7
  xml: ^6.5.0
  shared_preferences: ^2.3.2

dev_dependencies:
  build_runner: ^2.15.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.6-dev.1
  go_router_builder: ^4.3.0
  json_serializable: ^6.14.0
  riverpod_generator: ^4.0.4
  riverpod_lint: ^3.1.4
  slang_build_runner: ^4.16.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  adaptive_icon_background: assets/images/launcher/icon_adaptive_background.png
  adaptive_icon_foreground: assets/images/launcher/icon_adaptive_foreground.png
  # This project has no iOS platform folder, so iOS icon generation is disabled.
  ios: false
  image_path: assets/images/launcher/icon_ios.png
  remove_alpha_ios: true
  windows:
    generate: true
    image_path: assets/images/launcher/icon_windows.png
    background_color: "#FF3C1F"
    theme_color: "#FF3C1F"
  macos:
    generate: true
    image_path: assets/images/launcher/icon_macos.png
