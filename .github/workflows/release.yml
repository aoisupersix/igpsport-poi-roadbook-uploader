name: Release

on:
  push:
    tags:
      - "v*"

# Required to create a GitHub Release and upload assets.
permissions:
  contents: write

# Keep this in sync with .fvmrc (Flutter version is pinned via fvm locally).
env:
  FLUTTER_VERSION: "3.44.4"

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: android
            os: ubuntu-latest
          - target: linux
            os: ubuntu-latest
          - target: windows
            os: windows-latest
          - target: macos
            os: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install Linux build dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev \
            libsecret-1-dev libjsoncpp-dev

      - name: Install dependencies
        run: flutter pub get

      # Apply the pushed tag (e.g. v1.2.3) to pubspec.yaml so the built
      # artifacts carry the released version. Use bash explicitly so the same
      # step works on the Windows runner too.
      - name: Set version from tag
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "Setting pubspec version to ${version}+${GITHUB_RUN_NUMBER}"
          sed -i.bak "s/^version:.*/version: ${version}+${GITHUB_RUN_NUMBER}/" pubspec.yaml
          rm -f pubspec.yaml.bak
          grep '^version:' pubspec.yaml

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      # --- Android ---
      - name: Build Android APK
        if: matrix.target == 'android'
        run: flutter build apk --release

      - name: Package Android APK
        if: matrix.target == 'android'
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk \
            "dist/igpsport-poi-roadbook-uploader-${{ github.ref_name }}-android.apk"

      # --- Linux ---
      - name: Build Linux
        if: matrix.target == 'linux'
        run: flutter build linux --release

      - name: Package Linux
        if: matrix.target == 'linux'
        run: |
          mkdir -p dist
          tar -czf "dist/igpsport-poi-roadbook-uploader-${{ github.ref_name }}-linux-x64.tar.gz" \
            -C build/linux/x64/release/bundle .

      # --- macOS ---
      # No Apple Developer certificate is available in CI, so build an unsigned
      # (ad-hoc) app via xcodebuild with code signing disabled. The committed
      # project keeps its local automatic-signing settings untouched.
      - name: Build macOS (unsigned)
        if: matrix.target == 'macos'
        run: |
          flutter build macos --release --config-only
          xcodebuild -workspace macos/Runner.xcworkspace -scheme Runner \
            -configuration Release -derivedDataPath build/macos_unsigned \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            build

      - name: Package macOS
        if: matrix.target == 'macos'
        run: |
          mkdir -p dist
          app_path=$(find build/macos_unsigned/Build/Products/Release -maxdepth 1 -name '*.app' | head -n 1)
          ditto -c -k --sequesterRsrc --keepParent "$app_path" \
            "dist/igpsport-poi-roadbook-uploader-${{ github.ref_name }}-macos.zip"

      # --- Windows ---
      - name: Build Windows
        if: matrix.target == 'windows'
        run: flutter build windows --release

      - name: Package Windows
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path build/windows/x64/runner/Release/* `
            -DestinationPath "dist/igpsport-poi-roadbook-uploader-${{ github.ref_name }}-windows-x64.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Let GitHub auto-generate the changelog from pull requests merged
          # since the previous release (grouped by PR, not raw commits).
          generate_release_notes: true
          files: dist/*
          fail_on_unmatched_files: true
